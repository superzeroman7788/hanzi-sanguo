<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>三国自走棋·常规版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: #14100c;
    color: #e8d9b0;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    user-select: none; -webkit-user-select: none;
    max-width: 480px; margin: 0 auto; padding: 6px 8px 10px;
  }

  /* 顶栏 */
  #topbar {
    width: 100%; background: #241a10; border: 2px solid #4a3a28; border-radius: 8px;
    padding: 6px 10px; font-size: 13px; line-height: 1.7;
  }
  #topbar .row { display: flex; justify-content: space-between; }
  #topbar b { color: #f0c060; }
  #status {
    width: 100%; min-height: 20px; font-size: 12px; color: #b8a880;
    padding: 3px 2px; display: flex; align-items: center; justify-content: space-between; gap: 6px;
  }
  #sell, #cmd {
    font: bold 12px/1 inherit; padding: 4px 10px; border-radius: 5px;
    border: 1px solid #7a5a20; background: linear-gradient(#c89030, #8a5c14); color: #fff8e0;
  }
  #cmd.ready {
    background: linear-gradient(#f0c060, #b87818);
    animation: cmdpulse .7s infinite alternate;
  }
  @keyframes cmdpulse {
    from { box-shadow: 0 0 4px rgba(255,210,74,.5); }
    to   { box-shadow: 0 0 16px rgba(255,210,74,1); }
  }
  /* 点将卡 */
  #cmdPick { display: flex; gap: 10px; justify-content: center; padding: 0 10px; }
  .cmdCard {
    width: 108px; background: #2a2018; border: 2px solid #6a5636; border-radius: 10px;
    padding: 10px 6px; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 5px; transition: border-color .15s;
  }
  .cmdCard:hover { border-color: #f0c060; }
  .cmdCard img { width: 56px; height: 70px; image-rendering: pixelated; border-radius: 5px; }
  .cmdCard b { color: #f0c060; font-size: 16px; }
  .cmdCard span { font-size: 11px; color: #b8a880; line-height: 1.45; text-align: center; }
  .cmdCard .sk { color: #d8a858; }

  /* 棋盘 */
  #boardBox { position: relative; width: 100%; }
  canvas { display: block; width: 100%; border: 2px solid #4a3a28; border-radius: 6px; background: #223018; }

  /* 羁绊徽章（棋盘左上覆盖） */
  #synBadges {
    position: absolute; left: 5px; top: 5px; display: flex; flex-direction: column; gap: 4px;
    pointer-events: none;
  }
  .badge {
    font-size: 11px; line-height: 1.25; padding: 3px 6px; border-radius: 5px;
    background: rgba(20,14,8,.78); border: 1px solid #4a3a28; color: #7a6a4c;
    text-align: center; min-width: 40px;
  }
  .badge.on { color: #ffd889; border-color: #a8842c; background: rgba(58,40,14,.88); }
  .badge small { display: block; font-size: 10px; }

  /* 装备库 */
  #invRow { width: 100%; display: none; gap: 6px; padding: 4px 0; align-items: center; }
  #invRow.show { display: flex; }
  #invRow span { font-size: 11px; color: #8a7a58; }
  #invRow img {
    width: 34px; height: 34px; image-rendering: pixelated;
    border: 2px solid #4a3a28; border-radius: 5px; background: #1a1208;
  }
  #invRow img.sel { border-color: #f0c060; box-shadow: 0 0 8px rgba(240,192,96,.6); }
  #invRow img.relic { border-color: #a8842c; background: #241a08; }
  #invRow img.relic.sel { border-color: #ffd24a; box-shadow: 0 0 12px rgba(255,210,74,.85); }

  /* 商店 */
  #shopBar { width: 100%; display: flex; gap: 5px; margin-top: 4px; }
  .slot {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    background: #2a2018; border: 2px solid #4a3a28; border-radius: 7px;
    padding: 5px 2px 4px; cursor: pointer;
  }
  .slot.empty { opacity: .25; pointer-events: none; }
  .slot.locked { opacity: .45; pointer-events: none; }
  .slot img { width: 40px; height: 50px; image-rendering: pixelated; border-radius: 4px; }
  .slot .nm { font-size: 12px; font-weight: bold; margin-top: 2px; }
  .slot .st { font-size: 10px; color: #a89468; }
  .cost { color: #f0c060; }
  .c1 { border-top: 3px solid #9aa5a8; }
  .c2 { border-top: 3px solid #58b158; }
  .c3 { border-top: 3px solid #4a90e2; }
  .c4 { border-top: 3px solid #c060e0; }
  .fw { color: #7ab8f0; } .fs { color: #78d878; } .fu { color: #f08878; } .fq { color: #d0b0f0; }

  /* 按钮行 */
  #btnRow { width: 100%; display: flex; gap: 6px; margin-top: 6px; }
  button {
    font: bold 14px/1.3 inherit; letter-spacing: 2px;
    padding: 10px 0; border-radius: 8px; border: 2px solid #7a5a20;
    background: linear-gradient(#c89030, #8a5c14); color: #fff8e0; cursor: pointer;
  }
  button:disabled { filter: grayscale(1) brightness(.6); }
  #refresh, #buyxp { flex: 1; font-size: 12px; letter-spacing: 1px; }
  #speed, #sound { flex: 0 0 44px; font-size: 13px; padding: 10px 0; }
  #fight { flex: 1.6; font-size: 17px; letter-spacing: 6px;
    background: linear-gradient(#5aa832, #2e6e14); border-color: #3a7a1c; }

  #banner {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 12px;
    background: rgba(10,6,2,.75); border-radius: 6px; z-index: 5; text-align: center;
  }
  #banner.show { display: flex; }
  #bannerText { font-size: 38px; font-weight: bold; letter-spacing: 12px; color: #f0c060;
    text-shadow: 0 0 22px rgba(240,192,96,.6); }
  #bannerSub { font-size: 13px; color: #d8c8a0; line-height: 1.8; padding: 0 14px; }
  #next { width: 200px; }
</style>
</head>
<body>
  <div id="topbar">
    <div class="row">
      <span>回合 <b id="round">1</b>/15</span>
      <span>❤️ <b id="php">100</b></span>
      <span>💰 <b id="gold">0</b><span style="font-size:11px">(息<span id="interest">0</span>)</span></span>
      <span>连胜 <b id="streak">—</b></span>
    </div>
    <div class="row">
      <span>等级 <b id="level">5</b>　经验 <b id="xp">0/8</b></span>
      <span>人口 <b id="pop">0/5</b></span>
    </div>
  </div>
  <div id="status">
    <span id="statusText"></span>
    <button id="cmd" style="display:none">主帅技</button>
    <button id="sell" style="display:none">出售</button>
  </div>
  <div id="boardBox">
    <canvas id="cv"></canvas>
    <div id="synBadges"></div>
    <div id="banner">
      <div id="bannerText"></div>
      <div id="bannerSub"></div>
      <div id="cmdPick"></div>
      <button id="next">下 一 回 合</button>
    </div>
  </div>
  <div id="invRow"><span>装备▶</span></div>
  <div id="shopBar"></div>
  <div id="btnRow">
    <button id="refresh">刷新2金</button>
    <button id="buyxp">经验4金</button>
    <button id="speed">⏩</button>
    <button id="sound">🔊</button>
    <button id="fight">开 战</button>
  </div>
  <script src="zhujiang.js"></script>
</body>
</html>
