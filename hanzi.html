<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#221a10">
<title>汉字三国自走棋</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html {
    background:
      radial-gradient(ellipse 130% 80% at 50% 18%, rgba(122,96,58,.5) 0%, rgba(0,0,0,0) 60%),
      linear-gradient(175deg, #4a3b26 0%, #33281a 45%, #221a10 100%);
  }
  html, body { height: 100%; }
  body {
    position: fixed; inset: 0;
    overflow: hidden; touch-action: manipulation; background: transparent;
    display: flex; justify-content: center; align-items: flex-start;
    user-select: none; -webkit-user-select: none;
  }
  #app {
    width: 375px; flex: none; transform-origin: top center;
    background: linear-gradient(175deg, #efe3c8, #e6d6b4 60%, #e0cfa8);
    color: #4a3a26;
    font-family: "Kaiti SC", "STKaiti", "KaiTi", "Songti SC", serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 0 max(6px, env(safe-area-inset-bottom));
    box-shadow: 0 0 34px rgba(240,200,120,.14), 0 0 80px rgba(0,0,0,.6);
  }
  canvas { touch-action: none; }

  /* 顶栏：单行信息条（全出血） */
  #topbar {
    width: 100%;
    background: linear-gradient(180deg, #2e2418, #3a2d1c);
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 10px; font-size: 12.5px; line-height: 1.4; color: #e8d8b0;
    border-bottom: 1.5px solid #8a6a1c;
  }
  #topbar b { color: #f4c860; }

  /* 棋盘：全出血无边框 */
  #boardBox { position: relative; width: 100%; }
  canvas {
    display: block; width: 100%;
    border: 0; border-radius: 0;
    background: #e6d7b5;
  }

  /* 羁绊徽章：宣纸签 */
  #synBadges {
    position: absolute; left: 6px; top: 6px; display: flex; flex-direction: column; gap: 5px;
    pointer-events: none;
  }
  .badge {
    font-size: 11px; line-height: 1.3; padding: 3px 8px;
    background: rgba(246,236,212,.8); border: 1.5px solid #9a8a6a;
    border-radius: 5px 7px 6px 5px; color: #8a7a58; text-align: center; min-width: 40px;
    box-shadow: 1px 2px 0 rgba(58,47,36,.15);
  }
  .badge.on { color: #6a4a10; border-color: #8a6a1c; background: rgba(246,236,212,.94); }
  .badge.on small { color: #8a2818; }
  .badge small { display: block; font-size: 10px; }

  /* 装备库 */
  #invRow { width: 100%; display: none; gap: 6px; padding: 4px 8px; align-items: center; }
  #invRow.show { display: flex; }
  #invRow span { font-size: 11px; color: #8a7550; }
  #invRow img {
    width: 30px; height: 30px; image-rendering: pixelated;
    border: 2px solid #7a6a4c; border-radius: 5px; background: #f2e7cd;
    box-shadow: 1px 2px 0 rgba(58,47,36,.18);
  }
  #invRow img.sel { border-color: #b8891c; box-shadow: 0 0 10px rgba(212,164,52,.7); }

  /* 字盘：字案 */
  #gridWrap { width: 100%; margin-top: 0; position: relative; }
  #gridCv {
    display: block; width: 100%;
    border: 0; border-top: 1.5px solid #8a7550; border-radius: 0;
    background: linear-gradient(180deg, #f2e7cd, #e9dbba);
    touch-action: none;
  }
  #gridHint { text-align: left; font-size: 10.5px; color: #8a7550; padding: 3px 76px 2px 8px; white-space: nowrap; overflow: hidden; }
  #refresh {
    position: absolute; right: 3px; top: 0; z-index: 2;
    font: bold 11px/1 inherit; padding: 4px 9px; letter-spacing: 0;
    border: 1.5px solid #3a2f24; border-radius: 6px 5px 7px 5px;
    background: linear-gradient(180deg, #f2e7cd, #e2d2ac); color: #5a4a30;
    box-shadow: 1px 2px 0 rgba(58,47,36,.2); cursor: pointer;
  }
  #refresh:disabled { filter: grayscale(.6) brightness(.9); box-shadow: none; }
  #gridHint.err { color: #a02818; font-weight: bold; }

  /* 按钮行 */
  #btnRow { width: 100%; display: flex; gap: 6px; margin-top: 4px; padding: 0 6px; }
  button {
    font: bold 13px/1.3 inherit; letter-spacing: 1px;
    padding: 8px 0; border: 2px solid #3a2f24; border-radius: 8px 6px 9px 7px;
    background: linear-gradient(180deg, #f2e7cd, #e2d2ac); color: #5a4a30; cursor: pointer;
    box-shadow: 2px 3px 0 rgba(58,47,36,.22);
  }
  button:disabled { filter: grayscale(.6) brightness(.88); box-shadow: none; }
  #refresh, #buyxp { flex: 1; font-size: 12px; letter-spacing: 1px; }
  #speed, #sound { flex: 0 0 42px; font-size: 12px; padding: 8px 0; }
  #fight {
    flex: 1.7; font-size: 18px; letter-spacing: 10px; text-indent: 10px;
    background: linear-gradient(180deg, #b03020, #7a1c10);
    border: 2.5px solid #4a120a; border-radius: 9px 7px 8px 10px;
    color: #fbeecf;
    box-shadow: 0 0 16px rgba(176,48,32,.4), 2px 4px 0 rgba(40,10,6,.4);
  }

  #banner {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    background: radial-gradient(ellipse 120% 90% at 50% 42%, rgba(74,56,34,.94) 0%, rgba(36,26,14,.96) 55%, rgba(20,14,6,.97) 100%);
    border-radius: 6px; z-index: 5; text-align: center;
  }
  #banner.show { display: flex; }
  #bannerText {
    font-size: 40px; font-weight: bold; letter-spacing: 12px; color: #ffe9a8;
    text-shadow: 0 0 24px rgba(240,192,96,.7), 2px 3px 0 rgba(60,40,8,.5);
  }
  #bannerSub { font-size: 13px; color: #d8c8a0; line-height: 1.9; padding: 0 16px; }
  #next {
    width: 210px;
    background: linear-gradient(165deg, #f8eed2, #ecdcb2);
    border: 2.5px solid #8a6a1c; border-radius: 9px 7px 10px 8px; color: #241b0e;
    box-shadow: 0 0 20px rgba(240,192,96,.35), 3px 5px 0 rgba(60,40,10,.4);
  }
</style>
</head>
<body>
  <div id="app">
  <div id="topbar">
    <span>关 <b id="round">1</b>/10 · <span id="waveInfo">备战</span></span>
    <span>🧱<b id="wallN">5</b>/5</span>
    <span>💰<b id="gold">0</b></span>
  </div>
  <div id="boardBox">
    <canvas id="cv"></canvas>
    <div id="synBadges"></div>
    <div id="banner">
      <div id="bannerText"></div>
      <div id="bannerSub"></div>
      <button id="next">下 一 回 合</button>
    </div>
  </div>
  <div id="gridWrap">
    <div id="gridHint">👆 连相邻字凑名将</div>
    <button id="refresh">换盘1金</button>
    <canvas id="gridCv"></canvas>
  </div>
  </div>
  <script src="hanzi.js?v=rt24"></script>
</body>
</html>
