<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>汉字三国自走棋</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { background: #1c1712; }
  html, body { height: 100%; }
  body {
    overflow: hidden; touch-action: manipulation;
    display: flex; justify-content: center; align-items: flex-start;
    user-select: none; -webkit-user-select: none;
  }
  #app {
    width: 375px; flex: none; transform-origin: top center;
    background: linear-gradient(175deg, #efe3c8, #e6d6b4 60%, #e0cfa8);
    color: #4a3a26;
    font-family: "Kaiti SC", "STKaiti", "KaiTi", "Songti SC", serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 4px 8px 8px;
    box-shadow: 0 0 60px rgba(0,0,0,.55);
  }
  canvas { touch-action: none; }

  /* 顶栏：卷轴条 */
  #topbar {
    width: 100%; position: relative;
    background: linear-gradient(180deg, #f6ecd4, #ecdfc0);
    border: 2px solid #3a2f24; border-radius: 8px 10px 9px 7px;
    box-shadow: 2px 3px 0 rgba(58,47,36,.22);
    padding: 4px 10px 3px; font-size: 12px; line-height: 1.55; color: #4a3a26;
  }
  #topbar .row { display: flex; justify-content: space-between; }
  #topbar b { color: #8a2818; }
  #topbar::after {
    content: "将"; position: absolute; right: -6px; top: -8px;
    width: 30px; height: 30px; background: #a02818; color: #f4e0c0;
    border-radius: 5px 7px 6px 5px; transform: rotate(6deg);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; box-shadow: 1px 2px 3px rgba(0,0,0,.3);
  }
  #status {
    width: 100%; min-height: 18px; font-size: 11px; color: #6a5a3e;
    padding: 2px 2px; display: flex; align-items: center; justify-content: space-between; gap: 6px;
  }
  #sell {
    font: bold 13px/1 inherit; padding: 6px 14px;
    border: 1.5px solid #5a140c; border-radius: 6px 8px 7px 6px;
    background: linear-gradient(180deg, #a02818, #7a1c10); color: #f8e8c8;
    box-shadow: 0 3px 8px rgba(120,30,16,.4); cursor: pointer;
  }

  /* 棋盘 */
  #boardBox { position: relative; width: 100%; }
  canvas {
    display: block; width: 100%;
    border: 2.5px solid #3a2f24; border-radius: 8px 6px 9px 7px;
    background: #e6d7b5;
    box-shadow: inset 0 0 24px rgba(90,65,30,.2), 2px 4px 0 rgba(58,47,36,.2);
  }

  /* 羁绊徽章：宣纸签 */
  #synBadges {
    position: absolute; left: 6px; top: 6px; display: flex; flex-direction: column; gap: 5px;
    pointer-events: none;
  }
  .badge {
    font-size: 11px; line-height: 1.3; padding: 3px 8px;
    background: rgba(246,236,212,.8); border: 1.5px solid #9a8a6a;
    border-radius: 5px 7px 6px 5px; color: #8a7a58; text-align: center; min-width: 40px;
    box-shadow: 1px 2px 0 rgba(58,47,36,.15);
  }
  .badge.on { color: #6a4a10; border-color: #8a6a1c; background: rgba(246,236,212,.94); }
  .badge.on small { color: #8a2818; }
  .badge small { display: block; font-size: 10px; }

  /* 装备库 */
  #invRow { width: 100%; display: none; gap: 6px; padding: 5px 0; align-items: center; }
  #invRow.show { display: flex; }
  #invRow span { font-size: 11px; color: #8a7550; }
  #invRow img {
    width: 30px; height: 30px; image-rendering: pixelated;
    border: 2px solid #7a6a4c; border-radius: 5px; background: #f2e7cd;
    box-shadow: 1px 2px 0 rgba(58,47,36,.18);
  }
  #invRow img.sel { border-color: #b8891c; box-shadow: 0 0 10px rgba(212,164,52,.7); }

  /* 字盘：字案 */
  #gridWrap { width: 100%; margin-top: 3px; position: relative; }
  #gridCv {
    display: block; width: 100%;
    border: 2.5px solid #3a2f24; border-radius: 9px 7px 8px 10px;
    background: linear-gradient(180deg, #f2e7cd, #e9dbba);
    box-shadow: 2px 4px 0 rgba(58,47,36,.22);
    touch-action: none;
  }
  #gridHint { text-align: center; font-size: 10.5px; color: #8a7550; padding: 2px 0 1px; white-space: nowrap; overflow: hidden; }
  #gridHint.err { color: #a02818; font-weight: bold; }

  /* 按钮行 */
  #btnRow { width: 100%; display: flex; gap: 6px; margin-top: 5px; }
  button {
    font: bold 13px/1.3 inherit; letter-spacing: 1px;
    padding: 8px 0; border: 2px solid #3a2f24; border-radius: 8px 6px 9px 7px;
    background: linear-gradient(180deg, #f2e7cd, #e2d2ac); color: #5a4a30; cursor: pointer;
    box-shadow: 2px 3px 0 rgba(58,47,36,.22);
  }
  button:disabled { filter: grayscale(.6) brightness(.88); box-shadow: none; }
  #refresh, #buyxp { flex: 1; font-size: 12px; letter-spacing: 1px; }
  #speed, #sound { flex: 0 0 42px; font-size: 12px; padding: 8px 0; }
  #fight {
    flex: 1.7; font-size: 18px; letter-spacing: 10px; text-indent: 10px;
    background: linear-gradient(180deg, #b03020, #7a1c10);
    border: 2.5px solid #4a120a; border-radius: 9px 7px 8px 10px;
    color: #fbeecf;
    box-shadow: 0 0 16px rgba(176,48,32,.4), 2px 4px 0 rgba(40,10,6,.4);
  }

  #banner {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    background: radial-gradient(ellipse 120% 90% at 50% 42%, rgba(74,56,34,.94) 0%, rgba(36,26,14,.96) 55%, rgba(20,14,6,.97) 100%);
    border-radius: 6px; z-index: 5; text-align: center;
  }
  #banner.show { display: flex; }
  #bannerText {
    font-size: 40px; font-weight: bold; letter-spacing: 12px; color: #ffe9a8;
    text-shadow: 0 0 24px rgba(240,192,96,.7), 2px 3px 0 rgba(60,40,8,.5);
  }
  #bannerSub { font-size: 13px; color: #d8c8a0; line-height: 1.9; padding: 0 16px; }
  #next {
    width: 210px;
    background: linear-gradient(165deg, #f8eed2, #ecdcb2);
    border: 2.5px solid #8a6a1c; border-radius: 9px 7px 10px 8px; color: #241b0e;
    box-shadow: 0 0 20px rgba(240,192,96,.35), 3px 5px 0 rgba(60,40,10,.4);
  }
</style>
</head>
<body>
  <div id="app">
  <div id="topbar">
    <div class="row">
      <span>关卡 <b id="round">1</b>/10</span>
      <span>❤️ <b id="php">100</b></span>
      <span>💰 <b id="gold">0</b><span style="font-size:11px">(息<span id="interest">0</span>)</span></span>
      <span>连胜 <b id="streak">—</b></span>
    </div>
    <div class="row">
      <span>等级 <b id="level">5</b>　经验 <b id="xp">0/8</b></span>
      <span>人口 <b id="pop">0/5</b></span>
    </div>
  </div>
  <div id="status">
    <span id="statusText"></span>
    <button id="sell" style="display:none">出售</button>
  </div>
  <div id="boardBox">
    <canvas id="cv"></canvas>
    <div id="synBadges"></div>
    <div id="banner">
      <div id="bannerText"></div>
      <div id="bannerSub"></div>
      <button id="next">下 一 回 合</button>
    </div>
  </div>
  <div id="invRow"><span>装备▶</span></div>
  <div id="gridWrap">
    <div id="gridHint">👆 点字凑名（不用相邻）· 点两下＝确认/单买 · 发光的字能组名将</div>
    <canvas id="gridCv"></canvas>
  </div>
  <div id="btnRow">
    <button id="refresh">换一盘1金</button>
    <button id="buyxp">经验4金</button>
    <button id="speed">⏩</button>
    <button id="sound">🔊</button>
    <button id="fight">出 征</button>
  </div>
  </div>
  <script src="hanzi.js?v=rt11"></script>
</body>
</html>
