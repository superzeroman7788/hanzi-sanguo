<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>slash.png · 纯水墨刀光动画</title>
  <style>
    :root { color-scheme:dark; --gold:#c7a355; --time:1.15s; }
    * { box-sizing:border-box; }
    html,body { margin:0; min-height:100%; background:#181712; }
    body { display:grid; place-items:center; padding:18px; color:#eee4cf; font-family:system-ui,-apple-system,"PingFang SC",sans-serif; }
    main { width:min(100%,520px); }
    header { display:flex; align-items:end; justify-content:space-between; gap:16px; margin-bottom:10px; }
    h1 { margin:0; font:700 20px/1.2 "Kaiti SC","STKaiti",serif; letter-spacing:.12em; }
    .version { color:#9f9277; font-size:11px; letter-spacing:.08em; }
    .stage {
      position:relative; width:100%; aspect-ratio:1; overflow:hidden; isolation:isolate;
      border:1px solid #746446; border-radius:18px;
      background:
        radial-gradient(circle at 50% 48%,#fffaf0 0 21%,transparent 67%),
        repeating-linear-gradient(4deg,transparent 0 29px,#7b674a0b 30px 31px),
        linear-gradient(145deg,#f7efdf,#e8dcc4);
      box-shadow:0 22px 65px #0009,inset 0 0 80px #7d65421f;
    }
    .stage::before { content:""; position:absolute; inset:24px; border:1px solid #76634224; border-radius:12px; }
    .slash {
      position:absolute; z-index:2; left:-6%; top:-6%; width:112%; height:auto;
      opacity:0; transform-origin:10% 53%;
      transform:translateX(-28px) scaleX(.68) scaleY(.86);
      mix-blend-mode:multiply; pointer-events:none;
      will-change:opacity,transform,filter;
    }
    .playing .slash { animation:slash-only var(--time) cubic-bezier(.2,.62,.2,1) both; }
    @keyframes slash-only {
      0%,7% {
        opacity:0;
        transform:translateX(-28px) scaleX(.12) scaleY(.72);
        filter:blur(1.5px) contrast(1.12);
      }
      18% {
        opacity:.3;
        transform:translateX(-18px) scaleX(.38) scaleY(.82);
      }
      39% {
        opacity:.96;
        transform:translateX(0) scaleX(1) scaleY(1);
        filter:blur(0) contrast(1.18) brightness(.82);
      }
      52% {
        opacity:.88;
        transform:translateX(8px) scaleX(1.025) scaleY(.985);
        filter:blur(0) contrast(1.12) brightness(.86);
      }
      70% {
        opacity:.38;
        transform:translateX(18px) scaleX(1.055) scaleY(.96);
        filter:blur(.55px) contrast(1.05);
      }
      88%,100% {
        opacity:0;
        transform:translateX(28px) scaleX(1.075) scaleY(.94);
        filter:blur(1.4px);
      }
    }
    .controls { display:grid; grid-template-columns:1.35fr 1fr; gap:8px; margin-top:12px; }
    button { min-height:46px; border:1px solid #766646; border-radius:10px; background:#2a2821; color:#d7c8aa; font:600 13px/1 system-ui,sans-serif; cursor:pointer; }
    button.primary { border-color:var(--gold); background:#e7dcc5; color:#30291d; box-shadow:0 0 0 2px #c7a35524; }
    button[aria-pressed="true"] { color:#f4dfaa; border-color:#b49148; }
    .note { margin:10px 3px 0; color:#9f9277; font-size:12px; line-height:1.6; }
    .slow { --time:3.45s; }
    @media(prefers-reduced-motion:reduce){.playing .slash{animation:none!important}}
  </style>
</head>
<body>
  <main>
    <header><h1>水墨刀光</h1><span class="version">slash.png / 单特效</span></header>
    <section class="stage" id="stage" aria-label="纯水墨刀光动画预览">
      <img class="slash" src="../assets/effects/slash.png" alt="从左向右展开的弯月形水墨刀光">
    </section>
    <div class="controls" aria-label="播放控制">
      <button class="primary" id="replay" type="button">再播一次</button>
      <button id="slow" type="button" aria-pressed="false">慢放检查</button>
    </div>
    <p class="note">画面内只播放 slash.png：左起笔、向右展开、飞白消散。</p>
  </main>
  <script>
    const stage=document.getElementById('stage'),replay=document.getElementById('replay'),slow=document.getElementById('slow');
    function play(){stage.classList.remove('playing');void stage.offsetWidth;stage.classList.add('playing')}
    replay.addEventListener('click',play);
    slow.addEventListener('click',()=>{const on=document.body.classList.toggle('slow');slow.setAttribute('aria-pressed',String(on));slow.textContent=on?'恢复原速':'慢放检查';play()});
    window.addEventListener('load',()=>setTimeout(play,280));
  </script>
</body>
</html>
