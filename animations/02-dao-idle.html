<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>刀 · 单字资产待机预览</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #282821;
      --jade: #5b8a86;
      --paper: #f1e8d5;
      --gold: #c7a355;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #181712; }
    body {
      display: grid;
      place-items: center;
      padding: 18px;
      color: #eee4cf;
      font-family: system-ui, -apple-system, "PingFang SC", sans-serif;
    }
    main { width: min(100%, 430px); }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }
    h1 { margin: 0; font: 700 20px/1.2 "Kaiti SC", "STKaiti", serif; letter-spacing: .12em; }
    .version { color: #9f9277; font-size: 11px; letter-spacing: .08em; }
    .stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 560px;
      overflow: hidden;
      border: 1px solid #746446;
      border-radius: 18px;
      background:
        radial-gradient(circle at 50% 43%, #fffaf0 0 20%, transparent 62%),
        repeating-linear-gradient(4deg, transparent 0 29px, #7b674a0b 30px 31px),
        linear-gradient(145deg, #f7efdf, #e8dcc4);
      box-shadow: 0 22px 65px #0009, inset 0 0 80px #7d65421f;
    }
    .stage::before {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px solid #76634224;
      border-radius: 12px;
      pointer-events: none;
    }
    .guide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }
    .guide::before,
    .guide::after {
      content: "";
      position: absolute;
      background: #9c84552b;
    }
    .guide::before { width: 1px; height: 78%; left: 50%; top: 11%; }
    .guide::after { height: 1px; width: 78%; top: 50%; left: 11%; }
    .static .guide { opacity: 1; }
    .dao-wrap {
      position: relative;
      width: 82%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      transform-origin: 50% 76%;
      will-change: transform, filter;
    }
    .dao {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 11px 8px #27251d28);
    }
    .shadow {
      position: absolute;
      left: 50%;
      bottom: 15%;
      width: 43%;
      height: 20px;
      translate: -50% 0;
      border-radius: 50%;
      background: #2f2c2340;
      filter: blur(8px);
      transform-origin: center;
      will-change: transform, opacity;
    }
    .idle .dao-wrap { animation: breathe 3.6s cubic-bezier(.45,0,.35,1) infinite; }
    .idle .shadow { animation: shadow-breathe 3.6s cubic-bezier(.45,0,.35,1) infinite; }
    .brace .dao-wrap { animation: brace 2.2s cubic-bezier(.22,.75,.25,1) infinite; }
    .brace .shadow { animation: shadow-brace 2.2s ease-in-out infinite; }
    @keyframes breathe {
      0%, 100% { transform: translateY(0) rotate(0) scale(1); filter: none; }
      38% { transform: translateY(7px) rotate(-.45deg) scaleX(1.008) scaleY(.978); }
      66% { transform: translateY(-2px) rotate(.22deg) scaleX(.998) scaleY(1.006); }
      82% { transform: translateY(1px) rotate(-.1deg) scale(1); }
    }
    @keyframes shadow-breathe {
      0%, 100% { transform: scaleX(1); opacity: .72; }
      38% { transform: scaleX(1.08); opacity: .82; }
      66% { transform: scaleX(.95); opacity: .62; }
    }
    @keyframes brace {
      0%, 18%, 100% { transform: translateY(0) rotate(0) scale(1); }
      46% { transform: translateY(14px) rotate(-1deg) scaleX(1.035) scaleY(.948); }
      58% { transform: translateY(9px) rotate(-.45deg) scaleX(1.02) scaleY(.965); }
      73% { transform: translateY(-4px) rotate(.35deg) scaleX(.992) scaleY(1.012); }
      86% { transform: translateY(2px) rotate(-.12deg) scale(1); }
    }
    @keyframes shadow-brace {
      0%, 18%, 100% { transform: scaleX(1); opacity: .72; }
      46% { transform: scaleX(1.17); opacity: .9; }
      73% { transform: scaleX(.93); opacity: .58; }
    }
    .caption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 22px;
      text-align: center;
      color: #6e634e;
      font-size: 12px;
      letter-spacing: .08em;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    button {
      min-height: 44px;
      border: 1px solid #766646;
      border-radius: 10px;
      background: #2a2821;
      color: #d7c8aa;
      font: 600 13px/1 system-ui, sans-serif;
      cursor: pointer;
    }
    button[aria-pressed="true"] {
      border-color: var(--gold);
      background: #e7dcc5;
      color: #30291d;
      box-shadow: 0 0 0 2px #c7a35524;
    }
    .note { margin: 10px 3px 0; color: #9f9277; font-size: 12px; line-height: 1.6; }
    @media (max-height: 720px) {
      .stage { min-height: 490px; }
      .dao-wrap { width: 76%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .dao-wrap, .shadow { animation: none !important; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>刀 · 单字资产</h1>
      <span class="version">V1 / 字形锁定</span>
    </header>
    <section class="stage idle" id="stage" aria-label="刀字美术资产待机动画预览">
      <div class="guide" aria-hidden="true"></div>
      <div class="shadow" aria-hidden="true"></div>
      <div class="dao-wrap">
        <img class="dao" src="../assets/units/dao/dao-complete.png" alt="青绿色的汉字刀">
      </div>
      <div class="caption" id="caption">待机呼吸 · 3.6秒循环</div>
    </section>
    <div class="controls" aria-label="动画模式">
      <button type="button" data-mode="static" aria-pressed="false">静态校准</button>
      <button type="button" data-mode="idle" aria-pressed="true">待机呼吸</button>
      <button type="button" data-mode="brace" aria-pressed="false">蓄力预演</button>
    </div>
    <p class="note">本文件只验证字形、重量与呼吸感。暂不拆笔画、不做攻击，也不接入主游戏。</p>
  </main>
  <script>
    const stage = document.getElementById('stage');
    const caption = document.getElementById('caption');
    const buttons = [...document.querySelectorAll('[data-mode]')];
    const captions = {
      static: '静态校准 · 中心线与原始字形',
      idle: '待机呼吸 · 3.6秒循环',
      brace: '蓄力预演 · 下沉、压缩、回弹'
    };
    function setMode(mode) {
      stage.className = `stage ${mode}`;
      caption.textContent = captions[mode];
      for (const button of buttons) {
        button.setAttribute('aria-pressed', String(button.dataset.mode === mode));
      }
    }
    for (const button of buttons) {
      button.addEventListener('click', () => setMode(button.dataset.mode));
    }
  </script>
</body>
</html>
