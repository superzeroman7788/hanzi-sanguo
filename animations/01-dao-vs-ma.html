<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>克制动画 01 · 刀兵挡快马</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #17130e; color: #eadbb7; }
    body { display: grid; place-items: center; font-family: "Kaiti SC", "STKaiti", "KaiTi", serif; }
    main { width: min(100vw, 430px); padding: 18px 16px 22px; }
    header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
    h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: .08em; }
    .tag { font: 11px/1.4 system-ui, sans-serif; color: #a9966d; letter-spacing: .08em; }
    .stage { position: relative; overflow: hidden; border: 1px solid #5f4d2f; border-radius: 14px 11px 15px 10px;
      box-shadow: 0 18px 50px #0008, inset 0 0 50px #7b5b2320; background: #d9caa7; }
    canvas { display: block; width: 100%; aspect-ratio: 3 / 4.45; }
    .controls { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    button { flex: 1; min-height: 44px; border: 1px solid #987535; border-radius: 9px 7px 10px 8px;
      background: linear-gradient(#f5e8c3,#d9c58e); color: #2b2115; font: 700 16px/1 "Kaiti SC","STKaiti","KaiTi",serif;
      box-shadow: 0 3px 0 #6c5228; cursor: pointer; }
    button:active { transform: translateY(2px); box-shadow: 0 1px 0 #6c5228; }
    .note { margin: 11px 4px 0; color: #aa9975; font: 12px/1.6 system-ui, sans-serif; }
  </style>
</head>
<body>
<main>
  <header><h1>刀兵挡快马</h1><span class="tag">独立动画提案 01</span></header>
  <section class="stage"><canvas id="scene" width="720" height="1068" aria-label="快马冲向刀兵并被弹回的动画"></canvas></section>
  <div class="controls"><button id="replay">重播一次</button></div>
  <p class="note">观察重点：快马的速度感、碰撞瞬间、刀兵的稳定感，以及“不用文字能否看懂马被挡住”。</p>
</main>
<script>
(() => {
  const cv = document.getElementById('scene'), ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  let start = performance.now(), manualSound = false, audio = null;
  const clamp = (v,a=0,b=1)=>Math.max(a,Math.min(b,v));
  const easeOutCubic = t => 1-Math.pow(1-t,3);
  const easeInCubic = t => t*t*t;
  const easeOutBack = t => 1 + 2.70158*Math.pow(t-1,3) + 1.70158*Math.pow(t-1,2);
  const mix = (a,b,t)=>a+(b-a)*t;

  function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
  function paper(){
    const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#eadfbe');g.addColorStop(.55,'#d8c79f');g.addColorStop(1,'#c8b488');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=.07;ctx.strokeStyle='#6e5833';ctx.lineWidth=1;
    for(let i=0;i<55;i++){const y=(i*83)%H+Math.sin(i*9)*18;ctx.beginPath();ctx.moveTo(0,y);ctx.bezierCurveTo(W*.3,y+8,W*.68,y-10,W,y+4);ctx.stroke();}
    ctx.globalAlpha=1;
  }
  function lane(){
    ctx.fillStyle='#efe3c4aa';ctx.fillRect(145,0,430,H);
    ctx.strokeStyle='#8c734544';ctx.lineWidth=2;ctx.setLineDash([10,11]);
    [145,575].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();});ctx.setLineDash([]);
    for(let y=105;y<H;y+=145){ctx.strokeStyle='#846e4540';ctx.beginPath();ctx.moveTo(145,y);ctx.lineTo(575,y);ctx.stroke();}
    ctx.fillStyle='#76623b40';for(const [x,y] of [[240,180],[496,350],[205,676],[468,872]]){ctx.beginPath();ctx.ellipse(x,y,15,6,.2,0,Math.PI*2);ctx.fill();}
  }
  function card(x,y,ch,enemy,sx=1,sy=1,rot=0,alpha=1){
    ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);ctx.rotate(rot);ctx.scale(sx,sy);
    const w=136,h=150;
    ctx.fillStyle='#3a2b1b38';rr(-w/2+7,-h/2+10,w,h,17);ctx.fill();
    const g=ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);g.addColorStop(0,enemy?'#c89582':'#fbf1d9');g.addColorStop(1,enemy?'#a96558':'#e6d2a6');ctx.fillStyle=g;rr(-w/2,-h/2,w,h,17);ctx.fill();
    ctx.strokeStyle=enemy?'#5b160f':'#3b3023';ctx.lineWidth=6;ctx.stroke();
    ctx.fillStyle=enemy?'#49120d':'#21180f';ctx.font='bold 92px "Kaiti SC","STKaiti","KaiTi",serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ch,0,5);
    if(enemy){ctx.fillStyle='#2d2118';ctx.fillRect(42,-67,29,29);ctx.strokeStyle='#a12d20';ctx.lineWidth=3;ctx.strokeRect(42,-67,29,29);ctx.fillStyle='#d5ad52';ctx.font='bold 17px sans-serif';ctx.fillText('曹',56,-51);}
    ctx.restore();
  }
  function hp(x,y,color,p=1){ctx.fillStyle='#34271ecc';ctx.fillRect(x-61,y-91,122,13);ctx.fillStyle=color;ctx.fillRect(x-59,y-89,118*p,8);}
  function hoofTrail(x,y,a){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle='#6d241a';ctx.lineWidth=11;ctx.lineCap='round';for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(x-35+(i%2)*65,y+45+i*34);ctx.lineTo(x-24+(i%2)*65,y+61+i*34);ctx.stroke();}ctx.restore();}
  function shock(x,y,t){ctx.save();ctx.globalAlpha=1-t;ctx.strokeStyle='#b8891c';ctx.lineWidth=10*(1-t)+2;ctx.beginPath();ctx.arc(x,y,28+t*115,0,Math.PI*2);ctx.stroke();for(let i=0;i<8;i++){const a=i*Math.PI/4,len=45+t*70;ctx.beginPath();ctx.moveTo(x+Math.cos(a)*35,y+Math.sin(a)*35);ctx.lineTo(x+Math.cos(a)*len,y+Math.sin(a)*len);ctx.stroke();}ctx.restore();}
  function dust(x,y,t){ctx.save();ctx.globalAlpha=(1-t)*.32;ctx.fillStyle='#705536';for(let i=0;i<7;i++){const a=i*.9,r=28+t*(55+i*7);ctx.beginPath();ctx.arc(x+Math.cos(a)*r,y+Math.sin(a)*r*.45,10+i%3*4,0,Math.PI*2);ctx.fill();}ctx.restore();}
  function impactSound(){
    if(!manualSound)return;audio=audio||new (window.AudioContext||window.webkitAudioContext)();const now=audio.currentTime;
    const o=audio.createOscillator(),g=audio.createGain();o.type='triangle';o.frequency.setValueAtTime(115,now);o.frequency.exponentialRampToValueAtTime(48,now+.16);g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(.22,now+.01);g.gain.exponentialRampToValueAtTime(.0001,now+.22);o.connect(g).connect(audio.destination);o.start(now);o.stop(now+.24);
  }
  let hitPlayed=false;
  function draw(now){
    const elapsed=(now-start)/1000, T=elapsed%4.9;
    if(T<.08)hitPlayed=false;
    let horseY=190, horseSX=1,horseSY=1,horseRot=0, knifeSX=1,knifeSY=1, knifeY=815, shake=0;
    if(T<.65){horseY=190+Math.sin(T*10)*3;}
    else if(T<1.85){const t=clamp((T-.65)/1.2);horseY=mix(190,650,easeInCubic(t));horseRot=Math.sin(t*18)*.025;}
    else if(T<2.02){const t=clamp((T-1.85)/.17);horseY=mix(650,711,easeOutCubic(t));horseSX=mix(1,.78,t);horseSY=mix(1,1.14,t);knifeSX=mix(1,1.18,t);knifeSY=mix(1,.82,t);knifeY=mix(815,823,t);shake=12*t;if(!hitPlayed&&t>.2){hitPlayed=true;impactSound();}}
    else if(T<2.62){const t=clamp((T-2.02)/.6);horseY=mix(711,610,easeOutBack(t));horseSX=mix(.78,1,t);horseSY=mix(1.14,1,t);horseRot=Math.sin(t*18)*(1-t)*.12;knifeSX=mix(1.18,1,t);knifeSY=mix(.82,1,t);knifeY=mix(823,815,t);shake=8*(1-t);}
    else if(T<3.9){horseY=610+Math.sin((T-2.62)*12)*4;horseRot=Math.sin((T-2.62)*10)*.035;}
    else {const t=clamp((T-3.9)/1);horseY=mix(610,190,easeOutCubic(t));}

    ctx.save();if(shake){ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);}paper();lane();
    if(T>.65&&T<2.05)hoofTrail(360,horseY+65,clamp((T-.65)/.3)*(1-clamp((T-1.75)/.3)));
    if(T>1.85&&T<2.75){shock(360,746,clamp((T-1.85)/.9));dust(360,795,clamp((T-1.9)/.75));}
    card(360,knifeY,'刀',false,knifeSX,knifeSY,0);hp(360,knifeY,'#4d88bd',.92);
    card(360,horseY,'马',true,horseSX,horseSY,horseRot);hp(360,horseY,'#bd4b3d',.72);
    ctx.restore();
    requestAnimationFrame(draw);
  }
  document.getElementById('replay').addEventListener('click',()=>{manualSound=true;start=performance.now();hitPlayed=false;if(audio&&audio.state==='suspended')audio.resume();});
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
